<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="cap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- Graduation cap top (mortarboard) -->
  <polygon points="50,22 80,36 50,50 20,36" fill="url(#cap)"/>
  <!-- Cap base band -->
  <rect x="35" y="47" width="30" height="5" rx="2" fill="url(#cap)" opacity="0.9"/>
  <!-- Rising chart bars (bottom half) -->
  <rect x="22" y="68" width="8" height="14" rx="2" fill="white" opacity="0.75"/>
  <rect x="34" y="60" width="8" height="22" rx="2" fill="white" opacity="0.85"/>
  <rect x="46" y="54" width="8" height="28" rx="2" fill="white" opacity="0.95"/>
  <rect x="58" y="48" width="8" height="34" rx="2" fill="white"/>
  <rect x="70" y="58" width="8" height="24" rx="2" fill="white" opacity="0.7"/>
</svg>
